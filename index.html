async function saveToAirtable(f) {
const l=parseFloat(f.length),w=parseFloat(f.width),d=parseFloat(f.depth);
const fields={"First Name":f.firstName,"Last Name":f.lastName,"Phone":f.phone,"Email":f.email,"Address":f.address,"City":f.city,"Service":f.service,"Submitted At":new Date().toISOString()};
if(l&&w){fields["Square Feet"]=Math.round(l*w);}
if(l&&w&&d){fields["Cubic Yards"]=parseFloat(((l*w*d)/324).toFixed(2));}
if(f.length)fields["Length (ft)"]=l;
if(f.width)fields["Width (ft)"]=w;
if(f.depth)fields["Depth (in)"]=d;
await fetch(`https://api.airtable.com/v0/${AIRTABLE_BASE}/${encodeURIComponent(AIRTABLE_TABLE)}`,{method:"POST",headers:{"Authorization":`Bearer ${AIRTABLE_TOKEN}`,"Content-Type":"application/json"},body:JSON.stringify({fields})});
}
function saveLocal(data){try{const leads=JSON.parse(localStorage.getItem("fmd_leads")||"[]");leads.push({...data,submittedAt:new Date().toISOString()});localStorage.setItem("fmd_leads",JSON.stringify(leads));}catch(e){}}

{name:"Sarah M.",city:"Boulder",text:"Incredible service! They delivered and spread mulch in my entire front yard in under two hours. My garden beds look amazing."},

{name:"Derek R.",city:"Lafayette",text:"Great price, fast delivery, and the arborist chips look so natural. Our trees are much happier. Will use again every year."},
{name:"Jenny P.",city:"Louisville",text:"They did the weed pulling add-on too and my beds look professionally done. Super friendly and easy to reach via text."},

const [calcW,setCalcW]=useState("");

const [adminMode,setAdminMode]=useState(false);
const [showLogin,setShowLogin]=useState(false);

const [leads,setLeads]=useState([]);

useEffect(()=>{document.title="Flatirons Mulch Delivery | Boulder County";},[]);

function scrollTo(id){document.getElementById(id)?.scrollIntoView({behavior:"smooth"});}

function calc(){
const l=parseFloat(calcL),w=parseFloat(calcW),d=parseFloat(calcD);
if(!l||!w)return;
setCalcResult({sqft:Math.round(l*w),cy:((l*w*d)/324).toFixed(2)});
}

function smsBody(){
const name=form.firstName||"[Name]",addr=form.address||"[Address]";
const l=parseFloat(form.length||calcL),w=parseFloat(form.width||calcW),d=parseFloat(form.depth||calcD);
const sqft=l&&w?Math.round(l*w):"[Square Feet]";
const cy=l&&w&&d?((l*w*d)/324).toFixed(2):"[Cubic Yards]";
return encodeURIComponent(`Hi, my name is ${name}.\n\nMy address is ${addr}.\n\nMy landscaping area is approximately ${sqft} square feet and I need approximately ${cy} cubic yards of mulch.\n\nPlease send me a quote.`);
}

async function handleSubmit(e){
e.preventDefault();
if(form.honey)return;
setLoading(true);
try{await saveToAirtable(form);}catch(err){console.warn("Airtable:",err);}
saveLocal(form);
setLoading(false);
setSubmitted(true);
}

function adminLogin(){
if(adminPass==="flatirons2024"){setAdminMode(true);setShowLogin(false);setLeads(getLocal());}
else alert("Incorrect password");
}

function exportCSV(){
const blob=new Blob([toCSV(leads)],{type:"text/csv"});
const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="flatirons_leads.csv";a.click();
}

return (

<div style={{marginBottom:18}}><label style={{display:"block",fontSize:14,fontWeight:600,marginBottom:8}}>Service Requested *</label>
<div style={{display:"flex",gap:12}}>
{[["delivery","Delivery Only"],["delivery-spreading","Delivery + Spreading"]].map(([v,l])=>(
<div key={v} className={`svc-opt${form.service===v?" active":""}`} onClick={()=>setForm({...form,service:v})}>{l}</div>
))}
</div>
</div>
<button type="submit" className="btn-green" disabled={loading} style={{width:"100%",justifyContent:"center",padding:"15px",fontSize:16,opacity:loading?0.7:1}}>
{loading?"Submitting...":"Submit Quote Request"}
</button>
<p style={{fontSize:13,color:"#9ca3af",textAlign:"center",marginTop:10}}>No spam. We'll only contact you about your quote.</p>
</form>
)}
<div style={{textAlign:"center",marginTop:24}}>
<p style={{color:"#6b7280",fontSize:15,marginBottom:12}}>Prefer to text? Send your info directly:</p>
<a href={`sms:${PHONE}?body=${smsBody()}`} className="btn-green" style={{display:"inline-flex",textDecoration:"none"}}>💬 Open Pre-Filled Text Message</a>
</div>
</div>
</section>

{/* REVIEWS */}
<section id="reviews" style={{padding:"70px 20px"}}>
<div style={{maxWidth:1100,margin:"0 auto"}}>
<div style={{textAlign:"center",marginBottom:36}}>
<span className="section-tag">Testimonials</span>
<h2 style={{fontSize:"clamp(1.6rem,4vw,2.4rem)",fontWeight:900}}>What Customers Are Saying</h2>
</div>
<div className="card-grid">
{REVIEWS.map((r,i)=>(
<div key={i} className="review-card">
<div style={{color:"#f59e0b",fontSize:18,marginBottom:10}}>★★★★★</div>
<p style={{color:"#374151",lineHeight:1.7,marginBottom:16,fontSize:15}}>"{r.text}"</p>
<div style={{display:"flex",alignItems:"center",gap:10}}>
<div style={{width:36,height:36,background:"#166534",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:700}}>{r.name[0]}</div>
<div><div style={{fontWeight:700,fontSize:14}}>{r.name}</div><div style={{fontSize:13,color:"#9ca3af"}}>{r.city}, CO</div></div>
</div>
</div>
))}
</div>
</div>
</section>

{/* FAQ */}
<section id="faq" style={{padding:"70px 20px",background:"#f9fafb"}}>
<div style={{maxWidth:660,margin:"0 auto"}}>
<div style={{textAlign:"center",marginBottom:36}}>
<span className="section-tag">FAQ</span>
<h2 style={{fontSize:"clamp(1.6rem,4vw,2.4rem)",fontWeight:900}}>Common Questions</h2>
</div>
{FAQS.map((f,i)=>(
<div key={i} style={{borderBottom:"1px solid #e5e7eb"}}>
<button className="faq-btn" onClick={()=>setOpenFaq(openFaq===i?null:i)}>
<span>{f.q}</span><span style={{color:"#166534",fontSize:22}}>{openFaq===i?"−":"+"}</span>
</button>
{openFaq===i && <div style={{paddingBottom:18,fontSize:15,color:"#4b5563",lineHeight:1.7}}>{f.a}</div>}
</div>
))}
</div>
</section>

{/* CTA */}
<section style={{background:"#14532d",color:"#fff",padding:"60px 20px",textAlign:"center"}}>
<div style={{maxWidth:580,margin:"0 auto"}}>
<h2 style={{fontSize:"clamp(1.6rem,4vw,2.4rem)",fontWeight:900,color:"#fff",marginBottom:12}}>Ready to Transform Your Yard?</h2>
<p style={{color:"#bbf7d0",marginBottom:30,fontSize:16,lineHeight:1.6}}>Get a free quote in minutes. Serving all of Boulder County.</p>
<div style={{display:"flex",gap:12,justifyContent:"center",flexWrap:"wrap"}}>
<button style={{...{},background:"#fff",color:"#166534",border:"none",borderRadius:6,padding:"13px 26px",fontWeight:700,fontSize:15,cursor:"pointer"}} onClick={()=>scrollTo("quote")}>Get Free Quote</button>
<a href={`sms:${PHONE}?body=${smsBody()}`} className="btn-outline">💬 Text for a Quote</a>
<a href={`tel:${PHONE}`} className="btn-outline">📞 Call Us</a>
</div>
</div>
</section>

{/* FOOTER */}
<footer style={{background:"#111827",color:"#9ca3af",padding:"44px 20px 22px"}}>
<div style={{maxWidth:1100,margin:"0 auto",display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(190px,1fr))",gap:36,marginBottom:32}}>
<div>
<div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
<div style={{width:30,height:30,background:"#166534",borderRadius:6,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>🌿</div>
<span style={{color:"#fff",fontWeight:700,fontFamily:"Georgia,serif"}}>Flatirons Mulch Delivery</span>
</div>
<p style={{fontSize:13,lineHeight:1.7}}>Eco-friendly arborist wood chip mulch delivery and spreading for Boulder County homeowners.</p>
</div>
<div>
<div style={{color:"#fff",fontWeight:600,fontSize:15,marginBottom:12}}>Service Areas</div>
{CITIES.map(c=><div key={c} style={{fontSize:14,marginBottom:6}}>{c}, CO</div>)}
</div>
<div>
<div style={{color:"#fff",fontWeight:600,fontSize:15,marginBottom:12}}>Contact</div>
<a href={`tel:${PHONE}`} style={{display:"flex",alignItems:"center",gap:8,color:"#9ca3af",textDecoration:"none",marginBottom:10,fontSize:14}}>📞 (773) 844-0807</a>
<a href={`sms:${PHONE}?body=${smsBody()}`} style={{display:"flex",alignItems:"center",gap:8,color:"#9ca3af",textDecoration:"none",fontSize:14}}>💬 Text for a Quote</a>
<div style={{marginTop:18,fontSize:12,lineHeight:1.8,color:"#6b7280"}}>Mulch Delivery Boulder · Wood Chips Boulder<br/>Mulch Spreading Boulder County</div>
</div>
</div>
<div style={{maxWidth:1100,margin:"0 auto",borderTop:"1px solid #1f2937",paddingTop:18,display:"flex",justifyContent:"space-between",alignItems:"center",fontSize:13,flexWrap:"wrap",gap:8}}>
<span>© {new Date().getFullYear()} Flatirons Mulch Delivery. All rights reserved.</span>
<button style={{background:"none",border:"none",color:"#4b5563",cursor:"pointer",fontSize:13}} onClick={()=>setShowLogin(true)}>Admin</button>
</div>
</footer>

{/* FLOAT BTN */}
<a href={`sms:${PHONE}?body=${smsBody()}`} className="float-btn">💬 Text a Quote</a>

{/* ADMIN LOGIN */}
{showLogin && (
<div className="modal-bg">
<div className="modal-box">
<h3 style={{fontFamily:"Georgia,serif",fontSize:21,marginBottom:18}}>Admin Login</h3>
<input type="password" className="input" style={{marginBottom:14}} placeholder="Password" value={adminPass} onChange={e=>setAdminPass(e.target.value)} onKeyDown={e=>e.key==="Enter"&&adminLogin()}/>
<div style={{display:"flex",gap:10}}>
<button className="btn-green" style={{flex:1,justifyContent:"center"}} onClick={adminLogin}>Login</button>
<button style={{border:"1px solid #d1d5db",borderRadius:6,padding:"10px 16px",cursor:"pointer",background:"#fff"}} onClick={()=>setShowLogin(false)}>Cancel</button>
</div>
</div>
</div>
)}

{/* ADMIN PANEL */}
{adminMode && (
<div className="admin-overlay">
<div style={{maxWidth:980,margin:"0 auto"}}>
<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:22}}>
<h2 style={{fontFamily:"Georgia,serif",fontSize:24}}>Lead Dashboard</h2>
<div style={{display:"flex",gap:10}}>
<button className="btn-green" style={{padding:"9px 18px",fontSize:14}} onClick={exportCSV}>⬇️ Export CSV</button>
<button style={{border:"1px solid #d1d5db",borderRadius:6,padding:"9px 16px",cursor:"pointer",background:"#fff"}} onClick={()=>setAdminMode(false)}>Close</button>
</div>
</div>
<div style={{background:"#fff",border:"1px solid #e5e7eb",borderRadius:10,overflow:"hidden"}}>
{leads.length===0 ? (
<div style={{padding:56,textAlign:"center",color:"#9ca3af"}}>No leads yet. Submissions will appear here.</div>
) : (
<div style={{overflowX:"auto"}}>
<table>
<thead><tr>{["Date","Name","Phone","Email","City","Service","Sq Ft"].map(h=><th key={h}>{h}</th>)}</tr></thead>
<tbody>
{leads.map((l,i)=>{
const sqft=l.length&&l.width?Math.round(parseFloat(l.length)*parseFloat(l.width)):"–";
return(
<tr key={i} style={{background:i%2?"#f9fafb":"#fff"}}>
<td>{new Date(l.submittedAt).toLocaleDateString()}</td>
<td style={{fontWeight:600}}>{l.firstName} {l.lastName}</td>
<td><a href={`tel:${l.phone}`} style={{color:"#166534"}}>{l.phone}</a></td>
<td>{l.email}</td><td>{l.city}</td><td>{l.service}</td><td>{sqft}</td>
</tr>
);
})}
</tbody>
</table>
</div>
)}
</div>
<p style={{fontSize:13,color:"#9ca3af",textAlign:"center",marginTop:10}}>Admin password: flatirons2024</p>
</div>
</div>
)}
</div>
);
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
